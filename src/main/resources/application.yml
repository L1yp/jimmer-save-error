spring:
  datasource:
    url: "jdbc:sqlite:${user.dir}/db/${spring.application.name}.db?jdbc.get_generated_keys=true&busy_timeout=60000&journal_mode=WAL"
    hikari:
      maximum-pool-size: 64
      minimum-idle: 1
    driver-class-name: org.sqlite.JDBC
  flyway:
    locations: classpath:db/migration/{vendor}
  application:
    name: jimmer-example


jimmer:
  dialect: org.babyfish.jimmer.sql.dialect.SQLiteDialect
  language: kotlin
  show-sql: true
  pretty-sql: true
  database-validation-mode: ERROR